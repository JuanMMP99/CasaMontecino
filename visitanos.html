                <h3>Ubicación del Taller</h3>
                <p>Estamos ubicados en San Martín Tilcajete, la cuna de los alebrijes en Oaxaca, México.</p>
                <div class="map-placeholder">
                    <iframe src="https://www.google.com/maps/embed?pb=..." width="100%" height="300" style="border:0;" allowfullscreen=""></iframe>

                <input type="date" required>

            </form>
